<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Robot Operator Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <h1>ROBOTICS COMMAND CENTER</h1>
            </div>
            <div class="time-stamp" id="live-clock">00:00:00</div>
        </header>

        <!-- Main Layout -->
        <main class="main-content">
            <!-- Left Panel: Controls and Status -->
            <section class="left-panel">
                <!-- System Status -->
                <div class="card status-card">
                    <div class="card-header">
                        <h2>System Status</h2>
                    </div>
                    <div class="status-grid">
                        <div class="status-item" id="status-planner">
                            <span class="indicator red"></span>
                            <span class="label">Planner Node</span>
                        </div>
                        <div class="status-item" id="status-executor">
                            <span class="indicator red"></span>
                            <span class="label">Executor Node</span>
                        </div>
                        <div class="status-item" id="status-ollama">
                            <span class="indicator red"></span>
                            <span class="label">Ollama Connection</span>
                        </div>
                        <div class="status-item" id="status-active">
                            <span class="indicator red"></span>
                            <span class="label">Mission Active</span>
                        </div>
                    </div>
                </div>

                <!-- Mission Control -->
                <div class="card control-card">
                    <div class="card-header">
                        <h2>Mission Control</h2>
                    </div>
                    <div class="form-group">
                        <label for="prompt-input">Natural Language Command</label>
                        <textarea id="prompt-input" placeholder="Type a command for the robot... (e.g., 'go to shelf A then loading dock')" rows="4"></textarea>
                    </div>
                    <button id="btn-execute" class="btn btn-primary">
                        <span>Execute Mission</span>
                    </button>
                </div>
            </section>

            <!-- Right Panel: Output & Live Logs -->
            <section class="right-panel">
                <!-- Execution Details -->
                <div class="card execution-card">
                    <div class="card-header">
                        <h2>Live Status Log</h2>
                    </div>
                    <div class="status-display">
                        <div class="status-value" id="live-status">IDLE</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="progress-indicator"></div>
                        </div>
                    </div>
                </div>

                <!-- Mission JSON -->
                <div class="card json-card">
                    <div class="card-header">
                        <h2>Generated Mission JSON</h2>
                    </div>
                    <pre><code id="json-output">// Awaiting next mission request...</code></pre>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
